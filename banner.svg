<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#102a43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>

    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }

      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(45,212,191,0.4)); }
        50% { filter: drop-shadow(0 0 14px rgba(45,212,191,0.9)); }
      }

      @keyframes slideUp {
        0% { transform: translateY(18px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      .glow {
        animation: glow 3s ease-in-out infinite;
      }

      .float {
        animation: float 4s ease-in-out infinite;
      }

      .cursor {
        animation: blink 1s infinite;
      }

      .slide-1 { animation: slideUp .7s ease-out forwards; opacity: 0; }
      .slide-2 { animation: slideUp .7s ease-out .2s forwards; opacity: 0; }
      .slide-3 { animation: slideUp .7s ease-out .4s forwards; opacity: 0; }
      .slide-4 { animation: slideUp .7s ease-out .6s forwards; opacity: 0; }
    </style>
  </defs>

  <rect width="800" height="200" fill="url(#grad)" />

  <g opacity="0.13">
    <circle cx="100" cy="50" r="70" fill="#2dd4bf"/>
    <circle cx="700" cy="160" r="90" fill="#38bdf8"/>
    <circle cx="620" cy="35" r="45" fill="#facc15"/>
  </g>

  <g class="float" opacity="0.85">
    <text x="70" y="55" font-family="monospace" font-size="18" fill="#2dd4bf">&lt;/&gt;</text>
    <text x="690" y="70" font-family="monospace" font-size="16" fill="#facc15">{ }</text>
    <text x="105" y="165" font-family="monospace" font-size="16" fill="#38bdf8">const</text>
    <text x="650" y="145" font-family="monospace" font-size="16" fill="#c084fc">async</text>
  </g>

  <g class="glow slide-1">
    <text x="400" y="68" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">
      QASIM ALI
    </text>
  </g>

  <g class="slide-2">
    <text x="400" y="108" font-family="monospace" font-size="25" font-weight="bold" fill="#2dd4bf" text-anchor="middle">
      JavaScript &amp; TypeScript Full Stack Developer
      <tspan class="cursor">|</tspan>
    </text>
  </g>

  <g class="slide-3">
    <text x="400" y="143" font-family="monospace" font-size="16" fill="#d1d5db" text-anchor="middle">
      Surpass your digital rivals with innovative software solutions
    </text>
  </g>

  <g class="slide-4">
    <text x="160" y="176" font-family="monospace" font-size="15" fill="#facc15" text-anchor="middle">React</text>
    <text x="250" y="176" font-family="monospace" font-size="15" fill="#38bdf8" text-anchor="middle">Next.js</text>
    <text x="350" y="176" font-family="monospace" font-size="15" fill="#3178c6" text-anchor="middle">TypeScript</text>
    <text x="465" y="176" font-family="monospace" font-size="15" fill="#3c873a" text-anchor="middle">Node.js</text>
    <text x="565" y="176" font-family="monospace" font-size="15" fill="#4db33d" text-anchor="middle">MongoDB</text>
    <text x="665" y="176" font-family="monospace" font-size="15" fill="#61dafb" text-anchor="middle">Tailwind</text>
  </g>
</svg>